[project]
name = "agamemnon-client"
version = "0.1.0"
description = "Async Python client for the Agamemnon REST API"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.9,<4"

[pypi-dependencies]
"HomericIntelligence-Agamemnon" = { path = ".", editable = true }
httpx = ">=0.27,<1"
pydantic = ">=2.0,<3"

[feature.dev.pypi-dependencies]
pytest = ">=8.0"
pytest-asyncio = ">=0.23"
pytest-cov = ">=5.0"
respx = ">=0.21"
mypy = ">=1.10"
ruff = ">=0.4"

[feature.dev.tasks]
test = "python -m pytest tests/ -v --cov=agamemnon_client --cov-report=term-missing"
lint = "ruff check src/ tests/"
format = "ruff format src/ tests/"
typecheck = "mypy src/"

[environments]
default = { features = ["dev"], solve-group = "default" }
